name: Update LLM YouTube Landscape

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Update tracker data and GitHub Pages files
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          SERPAPI_TRANSCRIPT_LANGUAGE: ${{ vars.SERPAPI_TRANSCRIPT_LANGUAGE || 'en' }}
        run: python scripts/update_tracker.py --mode daily --require-transcripts

      - name: Commit generated updates
        run: |
          if git diff --quiet; then
            echo "No tracker updates found."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/videos.json docs/index.html docs/styles.css docs/videos.json
          git commit -m "Update LLM YouTube landscape data"
          git push
